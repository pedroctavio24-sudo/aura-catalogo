<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA — Catálogo 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#FDF6F0;--gold:#B8972A;--gold-lt:#C9A0A8;--gold-pale:#F5E6EA;--pink:#E8B4B8;--dark:#2C1810;--gray:#8C7B75;--divider:#E8DDD5;--wa:#25D366;--card:#FFFDFB;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:'Jost',sans-serif;color:var(--dark);min-height:100vh}
.top-bar{background:var(--gold);text-align:center;padding:8px 16px;font-size:10px;letter-spacing:2.5px;color:#fff;text-transform:uppercase;font-weight:500}
header{padding:28px 20px 14px;display:flex;flex-direction:column;align-items:center}
header img.logo{width:230px;max-width:75vw;object-fit:contain}
.header-meta{margin-top:10px;text-align:center}
.header-meta h1{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;letter-spacing:3px;text-transform:uppercase}
.header-meta p{font-size:10.5px;color:var(--gray);letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.gold-line{width:110px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:12px auto 0}
.info-strip{background:var(--gold-pale);border-top:1px solid var(--divider);border-bottom:1px solid var(--divider);display:flex;justify-content:center;gap:26px;padding:10px 20px;flex-wrap:wrap;font-size:11px}
/* Tabs */
.tabs{display:flex;gap:8px;overflow-x:auto;padding:16px 16px 4px;max-width:1100px;margin:0 auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;background:var(--card);border:1.5px solid var(--divider);border-radius:24px;padding:9px 18px;font-size:12px;font-weight:600;letter-spacing:.8px;cursor:pointer;transition:all .2s;white-space:nowrap;color:var(--dark)}
.tab.active{background:var(--gold);color:#fff;border-color:var(--gold);box-shadow:0 3px 12px rgba(184,151,42,.35)}
/* Search */
.search-wrap{max-width:1100px;margin:10px auto 0;padding:0 16px}
.search{width:100%;background:var(--card);border:1.5px solid var(--divider);border-radius:12px;padding:11px 16px;font-size:14px;font-family:'Jost';color:var(--dark);outline:none}
.search:focus{border-color:var(--gold)}
/* Grid */
main{max-width:1100px;margin:0 auto;padding:14px 16px 60px}
.count{font-size:11px;color:var(--gray);letter-spacing:1px;margin:8px 2px 12px;text-transform:uppercase}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:12px}
.card{background:var(--card);border:1px solid var(--divider);border-radius:16px;padding:0 0 14px;display:flex;flex-direction:column;overflow:hidden;transition:transform .18s,box-shadow .18s;animation:pop .35s ease both}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(44,24,16,.1)}
@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.card .thumb{height:130px;position:relative;display:flex;align-items:center;justify-content:center;font-size:42px;background:linear-gradient(135deg,var(--gold-pale),#FBF3EE);overflow:hidden}
.card .thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#fff}
.card .thumb .fb{position:relative;z-index:0}
.card .brand{font-size:9px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:var(--gold);padding:10px 12px 0}
.card .name{font-size:12px;font-weight:500;line-height:1.35;padding:3px 12px 0;flex:1}
.card .price{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;color:var(--gold);padding:8px 12px 0}
.card .buy{margin:9px 12px 0;display:flex;align-items:center;justify-content:center;gap:6px;background:var(--wa);color:#fff;font-size:10.5px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:8px;border-radius:20px;text-decoration:none;transition:opacity .2s}
.card .buy:hover{opacity:.86}
.card .buy svg{width:13px;height:13px;fill:#fff}
.empty{text-align:center;color:var(--gray);padding:50px 0;font-size:14px}
/* Floating WA */
.float-wa{position:fixed;bottom:22px;right:18px;z-index:999;background:var(--wa);width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(37,211,102,.45);text-decoration:none}
.float-wa svg{width:28px;height:28px;fill:#fff}
footer{background:var(--gold);color:#fff;text-align:center;padding:14px;font-size:10px;letter-spacing:1px;line-height:1.8;margin-top:30px}
@media(max-width:480px){.grid{grid-template-columns:repeat(2,1fr);gap:10px}.card .thumb{height:104px;font-size:34px}}

.modal-bg{position:fixed;inset:0;background:rgba(44,24,16,.55);backdrop-filter:blur(6px);z-index:1000;display:none;align-items:center;justify-content:center;padding:18px}
.modal-bg.open{display:flex;animation:fadeBg .25s ease}
@keyframes fadeBg{from{opacity:0}to{opacity:1}}
.modal{background:var(--card);border-radius:24px;max-width:430px;width:100%;max-height:88vh;overflow-y:auto;position:relative;animation:popM .3s cubic-bezier(.2,.8,.3,1.1);box-shadow:0 30px 80px rgba(0,0,0,.35)}
@keyframes popM{from{opacity:0;transform:scale(.9) translateY(16px)}to{opacity:1;transform:none}}
.modal .m-close{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.92);border:1px solid var(--divider);font-size:17px;cursor:pointer;z-index:2;color:var(--dark);display:flex;align-items:center;justify-content:center}
.modal .m-img{width:100%;height:330px;object-fit:contain;background:linear-gradient(135deg,#fff,var(--gold-pale));border-radius:24px 24px 0 0;display:block}
.modal .m-body{padding:18px 22px 24px;text-align:center}
.modal .m-brand{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}
.modal .m-name{font-size:17px;font-weight:500;margin:6px 0 4px;color:var(--dark);line-height:1.4}
.modal .m-price{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;color:var(--gold);margin:8px 0 14px}
.modal .m-buy{display:inline-flex;align-items:center;gap:8px;background:var(--wa);color:#fff;font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:13px 34px;border-radius:30px;text-decoration:none}
.modal .m-buy svg{width:15px;height:15px;fill:#fff}
@media(max-width:480px){.modal .m-img{height:270px}}
.card{cursor:pointer}

</style>
</head>

function fmt(p){return "R$ "+p.toLocaleString('pt-BR',{minimumFractionDigits:p%1?2:0,maximumFractionDigits:2});}
function waLink(name,price){

}
function render(){

function openModal(idx,ev){
